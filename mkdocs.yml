site_name: Range Node Core
site_url: https://mataii.github.io/Range-Node-Core-Docs/

theme:
  name: material

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true

docs_dir: docs
